name: 缺陷报告
description: 报告可复现的行为错误
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请先删除日志中的密钥、用户文档和其他敏感信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么，预期行为是什么？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现步骤
      placeholder: |
        1. 安装……
        2. 运行……
        3. 观察……
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python 版本
      options:
        - "3.10"
        - "3.11"
        - 其他
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志
      render: shell
