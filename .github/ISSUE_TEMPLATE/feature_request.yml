name: 功能建议
description: 提议与物理竞赛问答或文档总结有关的改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明用户场景，不要只描述一个技术方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性影响
      description: 是否影响现有接口、提示词、索引或数据格式？
